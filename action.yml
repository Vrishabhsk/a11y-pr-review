name: 'A11y PR Review'
description: 'Automated accessibility (WCAG) review for pull requests'
author: 'Accessibility Team'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  llm-backend:
    description: 'LLM backend (gemini or ollama)'
    required: true
    default: 'gemini'
  api-key:
    description: 'API key (Gemini API key or Ollama auth)'
    required: false
  model:
    description: 'Model to use'
    required: false
    default: 'gemini-2.0-flash'
  ollama-url:
    description: 'Ollama API URL (if using ollama backend)'
    required: false
    default: 'http://localhost:11434'

outputs:
  issues-found:
    description: 'Number of accessibility issues found'

runs:
  using: 'node20'
  main: 'dist/index.js'
name: 'A11y PR Review'
description: 'Automated accessibility (WCAG) review for pull requests using LLM analysis'
author: 'Accessibility Team'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  llm-backend:
    description: 'LLM backend to use: "gemini" or "ollama"'
    required: true
    default: 'gemini'
  api-key:
    description: |
      API key for authentication.
      - For Gemini: Required. Your Google AI API key.
      - For Ollama Cloud: Required if using ollama.com. Can also set OLLAMA_API_KEY env var.
      - For local Ollama: Optional, only needed if your server requires auth.
    required: false
  model:
    description: |
      Model to use for analysis.
      - Gemini (default): gemini-2.0-flash
      - Ollama (default): qwen2.5-coder:32b
      - Ollama Cloud: Use models with -cloud suffix (e.g., llama3.2:3b-cloud)
    required: false
    default: 'gemini-2.0-flash'
  ollama-url:
    description: |
      Ollama API URL (only for ollama backend).
      - Local: http://localhost:11434 (default)
      - Ollama Cloud: https://ollama.com
    required: false
    default: 'http://localhost:11434'
  fail-on-issues:
    description: 'Fail the action if CRITICAL or IMPORTANT accessibility issues are found'
    required: false
    default: 'true'

outputs:
  issues-found:
    description: 'Number of accessibility issues found'

runs:
  using: 'node20'
  main: 'dist/index.js'